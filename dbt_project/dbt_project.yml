name: "traffic_project"
version: "1.0.0"
config-version: 2

profile: "traffic_project"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  traffic_project:

    # STAGING LAYER (raw → cleaned)
    staging:
      +materialized: view
      +schema: staging

    # INTERMEDIATE LAYER (business enrichment)
    intermediate:
      +materialized: view
      +schema: intermediate

    # MARTS (final business models)
    marts:
      +materialized: table
      +schema: marts